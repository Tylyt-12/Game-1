<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Змейка</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <div class="container">
      <section class="menu-screen visible" id="menuScreen">
        <h1>Змейка</h1>
        <p>Собирайте яблоки, расширяйте змею и избегайте стен и собственного хвоста.</p>
        <div class="menu-actions">
          <button id="playButton">Играть</button>
        </div>
        <div class="menu-hint">
          <p>Управление: стрелки или WASD.</p>
        </div>
      </section>

      <section class="game-screen hidden" id="gameScreen">
        <div class="game-panel">
          <canvas id="gameCanvas" width="400" height="400" aria-label="Игровое поле змейки"></canvas>
          <div class="info">
            <p>Счёт: <span id="score">0</span></p>
            <p>Лучший: <span id="bestScore">0</span></p>
            <p id="status">Нажмите стрелку, чтобы начать</p>
            <div class="buttons">
              <button id="startButton">Старт</button>
              <button id="menuButton">Меню</button>
            </div>
          </div>
        </div>
      </section>

      <section class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-box">
          <h2>Игра окончена</h2>
          <p>Ваш счёт: <strong id="finalScore">0</strong></p>
          <div class="overlay-actions">
            <button id="retryButton">Попробовать снова</button>
            <button id="backToMenuButton">В главное меню</button>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
